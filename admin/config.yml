backend:
  name: github
  repo: sahraandbeyond/sahra-beyond
  branch: main
  base_url: https://sahra-beyond-qo5i.vercel.app
  auth_endpoint: api/auth

media_folder: "uploads"
public_folder: "/uploads"

site_url: https://www.sahraandbeyond.ae

collections:

  - name: "locations"
    label: "Locations"
    label_singular: "Location"
    folder: "content/locations"
    create: true
    format: json
    slug: "{{slug}}"
    identifier_field: name
    summary: "{{emoji}} {{name}} — {{emirate}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Emoji Icon", name: "emoji", widget: "string", default: "📍" }
      - { label: "Emirate", name: "emirate", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Dunes", "Mountains", "Wadis", "Coast", "Camping", "Night"]
      - label: "Difficulty"
        name: "difficulty"
        widget: "select"
        options: ["Easy", "Moderate", "Hard"]
      - { label: "Best Season", name: "season", widget: "string", default: "Oct–Apr" }
      - { label: "Distance from Dubai", name: "distance", widget: "string", required: false }
      - { label: "Latitude", name: "lat", widget: "number", value_type: "float", step: 0.0001, hint: "Decimal degrees, e.g. 24.9183. Tip: right-click the exact spot in Google Maps and the FIRST number shown is the latitude." }
      - { label: "Longitude", name: "lng", widget: "number", value_type: "float", step: 0.0001, hint: "Decimal degrees, e.g. 55.5672. The SECOND number from Google Maps is the longitude." }
      - label: "Condition Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Ideal", value: "safe" }
          - { label: "Warm", value: "warn" }
          - { label: "Hot / Extreme", value: "hot" }
      - { label: "Short Description", name: "desc", widget: "text", hint: "One or two sentences. Shown on cards, the map and as the page meta description." }
      - { label: "Full Description (SEO page)", name: "body", widget: "text", required: false, hint: "A few paragraphs (separate with a blank line). This is the main content of the location's own Google-indexed page. Leave blank to fall back to the short description." }
      - { label: "Cover Photo", name: "cover", widget: "image", required: false, hint: "Main photo — used as the page banner AND the preview image when the page is shared on WhatsApp/Instagram/etc. A wide landscape photo works best." }
      - label: "Cover Photo Framing"
        name: "coverFocus"
        widget: "select"
        required: false
        default: "50% 50%"
        hint: "The cover is cropped to fit the card and banner. Pick which part of the photo to keep in view. Try 'Top' or 'Upper' if the important part is near the top of a tall photo."
        options:
          - { label: "Center (default)", value: "50% 50%" }
          - { label: "Top", value: "50% 0%" }
          - { label: "Upper third", value: "50% 25%" }
          - { label: "Lower third", value: "50% 75%" }
          - { label: "Bottom", value: "50% 100%" }
          - { label: "Left", value: "0% 50%" }
          - { label: "Right", value: "100% 50%" }
      - label: "Photo Gallery"
        name: "gallery"
        widget: "list"
        required: false
        hint: "Add as many photos as you like — they appear in a gallery on the location's page. Upload from your computer; no coding needed."
        field: { label: "Photo", name: "image", widget: "image" }
      - label: "Instagram Posts"
        name: "igPosts"
        widget: "list"
        required: false
        hint: "Paste full Instagram post/reel URLs (e.g. https://www.instagram.com/p/XXXXXXXXX/). Each one is embedded in the location's 'On the gram' section. Leave empty if none."
        field: { label: "Instagram Post URL", name: "url", widget: "string" }

  - name: "settings"
    label: "Settings"
    files:
      - label: "App Settings"
        name: "general"
        file: "content/settings.json"
        fields:
          - { label: "App Name", name: "appName", widget: "string", default: "Sahra & Beyond" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Google Maps API Key", name: "gmapsKey", widget: "string" }
          - { label: "OpenWeatherMap API Key", name: "weatherKey", widget: "string" }
          - { label: "Amazon Associates Tag", name: "amazonTag", widget: "string", required: false, hint: "Your Amazon.ae tracking ID (e.g. sahraandbeyon-21). Applied to every Amazon link on the site." }
          - { label: "Affiliate Disclosure", name: "affiliateDisclosure", widget: "text", required: false, hint: "Shown in the footer. Required for Amazon/affiliate compliance." }
          - { label: "Hero Eyebrow (optional)", name: "heroEyebrow", widget: "string", required: false, hint: "Small label above the homepage title. Leave blank to keep the default." }
          - { label: "Hero Title (optional)", name: "heroTitle", widget: "string", required: false, hint: "Main homepage headline. Leave blank to keep the default styled title." }
          - label: "Social Profiles"
            name: "social"
            widget: "object"
            hint: "Links used by the footer social icons. Leave a field blank to hide that icon."
            fields:
              - { label: "Instagram URL", name: "instagram", widget: "string", required: false, default: "https://instagram.com/sahra_and_beyond" }
              - { label: "TikTok URL", name: "tiktok", widget: "string", required: false, default: "https://tiktok.com/@sahra_and_beyond" }
              - { label: "YouTube URL", name: "youtube", widget: "string", required: false, default: "https://youtube.com/@sahra_and_beyond" }
          - label: "Monetization (fill in when ready)"
            name: "monetization"
            widget: "object"
            hint: "Each booking/tours/newsletter block on the site only appears once you paste a value here. Leave blank to keep it hidden."
            fields:
              - { label: "Tours/Activities link template", name: "toursUrlTemplate", widget: "string", required: false, hint: "Your affiliate search URL with {query} where the place name goes. e.g. https://www.getyourguide.com/s/?q={query}&partner_id=YOURID" }
              - { label: "Hotel/Booking link template", name: "bookingUrlTemplate", widget: "string", required: false, hint: "e.g. https://www.booking.com/searchresults.html?ss={query}&aid=YOURID" }
              - { label: "Newsletter form endpoint", name: "newsletterAction", widget: "string", required: false, hint: "The form POST URL from your email provider (Mailchimp/Buttondown/etc.). When set, the email sign-up box appears." }
              - { label: "Newsletter blurb", name: "newsletterBlurb", widget: "text", required: false, hint: "Short line shown above the email sign-up box." }

  - name: "packing"
    label: "Packing List"
    files:
      - label: "Packing List Items"
        name: "items"
        file: "content/packing.json"
        description: "Master packing list. Items appear in the Trip planner, grouped by heading and filtered to the trip's adventure type."
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            label_singular: "Item"
            summary: "{{fields.name}}  ·  {{fields.group}}"
            fields:
              - { label: "Group heading", name: "group", widget: "string", hint: "Items with the same heading are grouped together, e.g. '💧 Water & Hydration'." }
              - { label: "Item name", name: "name", widget: "string" }
              - { label: "Quantity", name: "qty", widget: "string", required: false, hint: "Optional. Tokens: {p} = group size, {half} = half the group, {water} = 4L × group. e.g. ×{p}  or  {water}L total" }
              - { label: "Note", name: "note", widget: "string", required: false, hint: "Small grey sub-text under the item (e.g. a free app name)." }
              - { label: "Amazon search term", name: "query", widget: "string", required: false, hint: "What the Amazon button searches for, e.g. 'sand recovery boards'. Leave blank (and no product link) for no button." }
              - { label: "Amazon product link (optional)", name: "amazon", widget: "string", required: false, hint: "Paste a specific Amazon.ae product URL (e.g. https://www.amazon.ae/dp/B0XXXXXXX) to link straight to that product instead of a search. Your affiliate tag is added automatically. Overrides the search term above." }
              - label: "Show only for"
                name: "show"
                widget: "select"
                multiple: true
                required: false
                options: ["Overnight", "Dunes", "Wadis", "Coast", "Mountains", "Camping"]
                hint: "Leave empty to always show. 'Overnight' shows on overnight trips; an adventure type shows only for that destination category."
